<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Whitelistarr</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <header>
    <h1>Whitelistarr</h1>
    <span id="version" class="muted"></span>
  </header>

  <div id="banner" class="banner hidden"></div>
  <div id="errors" class="errors hidden"></div>

  <main>
    <section id="actions" class="card">
      <h2>Actions</h2>
      <div class="actions-row">
        <button data-action="test-notification" class="btn">Send test notification</button>
        <button data-action="sweep" class="btn">Run sweep now</button>
        <button data-action="reverse" class="btn danger">Run reverse (remove all labels)</button>
      </div>
      <div id="action-result" class="muted"></div>
    </section>

    <form id="config-form"></form>
  </main>

  <div class="savebar">
    <span id="save-status" class="muted"></span>
    <button id="save-btn" class="btn primary" type="button">Save</button>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>

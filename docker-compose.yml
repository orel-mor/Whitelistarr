services:
  whitelistarr:
    # Local build/run compose. `docker compose up --build` builds and runs the
    # image from source; CI publishes the official multi-arch images. To run a
    # published image instead, replace `build: .` with the pinned tag.
    image: orelmor/whitelistarr:latest
    build: .
    container_name: whitelistarr
    restart: unless-stopped
    # Configuration is read from .env (see .env.example). The container runs
    # unprivileged via PUID/PGID (default 1000:1000); set them to your host user
    # if the ./data bind mount has restrictive ownership.
    env_file: .env
    ports:
      # Webhook receiver and web UI. Drop this if Seerr/Plex reach the container
      # over a shared Docker network at http://whitelistarr:8000.
      - "8000:8000"
    volumes:
      # Persists the notification-dedup database and web-UI config.
      - ./data:/data

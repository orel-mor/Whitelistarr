name: Bug report
description: Something isn't working as expected
labels: ["bug"]
body:
  - type: textarea
    id: what
    attributes:
      label: What happened?
      description: What did you expect to happen, and what happened instead?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. ...
        2. ...
  - type: input
    id: version
    attributes:
      label: Version / image tag
      placeholder: "orelmor/whitelistarr:1.8.0"
    validations:
      required: true
  - type: dropdown
    id: deployment
    attributes:
      label: How are you running it?
      options:
        - Docker Compose
        - docker run
        - Local (pip)
        - Other
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Paste container logs. Set LOG_LEVEL=debug for more detail.
      render: shell
  - type: textarea
    id: config
    attributes:
      label: Config (redact tokens/secrets!)
      render: yaml

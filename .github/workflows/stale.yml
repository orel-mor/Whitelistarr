name: Stale

on:
  schedule:
    - cron: "30 1 * * *"
  workflow_dispatch:

jobs:
  stale:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
      - uses: actions/stale@v10
        with:
          stale-issue-message: >
            This issue has been automatically marked stale due to inactivity.
            It will be closed in 7 days if no further activity occurs.
          stale-pr-message: >
            This pull request has been automatically marked stale due to
            inactivity. It will be closed in 7 days if no further activity occurs.
          stale-issue-label: stale
          stale-pr-label: stale
          exempt-issue-labels: never-stale,pinned,security
          exempt-pr-labels: never-stale,pinned
          days-before-stale: 45
          days-before-close: 7

name: Edge image

# Trunk-based dev channel. Every push to `main` builds and publishes the bleeding-
# edge image tagged :dev (+ :dev-<short-sha>) so you can test the latest code
# before cutting a stable release (see release.yml). No version bump, no tag, no
# GitHub Release — just an image. amd64-only to keep per-merge CI fast; stable
# releases are multi-arch. Skips docs-only pushes (paths filter).

on:
  push:
    branches: [main]
    paths:
      - "Dockerfile"
      - ".dockerignore"
      - "app/**"
      - "pyproject.toml"
      - ".github/workflows/edge.yml"

concurrency:
  group: edge
  cancel-in-progress: true

jobs:
  build:
    name: Build + push :dev
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0 # tags needed for setuptools-scm version

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Resolve dev version
        id: ver
        run: |
          pip install --quiet setuptools-scm
          echo "version=$(python -m setuptools_scm)" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          platforms: linux/amd64
          build-args: |
            SETUPTOOLS_SCM_PRETEND_VERSION_FOR_WHITELISTARR=${{ steps.ver.outputs.version }}
          tags: |
            orelmor/whitelistarr:dev
            orelmor/whitelistarr:dev-${{ github.sha }}
            ghcr.io/orel-mor/whitelistarr:dev
            ghcr.io/orel-mor/whitelistarr:dev-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

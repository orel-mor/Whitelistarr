name: Release PR Title

# When a dev -> main promotion PR opens, set its title to `release: <Asia/Jerusalem
# datetime>` and fill the body with a grouped changelog of the commits being promoted.
# dev -> main merges with a MERGE COMMIT, so the title drives no release — python-
# semantic-release reads the individual commits already on main. Title is a human-
# readable marker; the `release` type is whitelisted in pr-title.yml.

on:
  pull_request_target:
    types: [opened]

permissions:
  pull-requests: write

jobs:
  set-title:
    name: Auto-title dev -> main PR
    if: github.event.pull_request.base.ref == 'main' && github.event.pull_request.head.ref == 'dev'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v9
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const stamp = new Date().toLocaleString('sv-SE', {
              timeZone: 'Asia/Jerusalem',
              year: 'numeric', month: '2-digit', day: '2-digit',
              hour: '2-digit', minute: '2-digit', hour12: false,
            });
            const pull_number = context.payload.pull_request.number;

            // Commits in dev but not main = exactly what this promotion releases.
            const commits = await github.paginate(github.rest.pulls.listCommits, {
              ...context.repo, pull_number, per_page: 100,
            });
            const subjects = commits
              .filter(c => c.parents.length === 1) // drop back-merge commits
              .map(c => c.commit.message.split('\n')[0]);

            const groups = { Features: [], Fixes: [], Other: [] };
            for (const s of subjects) {
              if (/^feat(\(.+\))?!?:/.test(s)) groups.Features.push(s);
              else if (/^(fix|perf)(\(.+\))?!?:/.test(s)) groups.Fixes.push(s);
              else groups.Other.push(s);
            }

            let body = `## Release ${stamp}\n\n` +
              `Promotes \`dev\` → \`main\`. python-semantic-release cuts the stable ` +
              `release from the commits below.\n`;
            for (const [name, items] of Object.entries(groups)) {
              if (!items.length) continue;
              body += `\n### ${name}\n` + items.map(s => `- ${s}`).join('\n') + '\n';
            }

            await github.rest.pulls.update({
              ...context.repo, pull_number, title: `release: ${stamp}`, body,
            });

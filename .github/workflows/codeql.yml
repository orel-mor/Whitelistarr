name: CodeQL

# Static security analysis. Code scanning is free on PUBLIC repos; on private
# repos it needs GitHub Advanced Security, so the job is guarded to skip while
# the repo is private. It activates automatically once you make the repo public.

on:
  push:
    branches: [main, beta]
  pull_request:
    branches: [main, beta]
  schedule:
    - cron: "20 3 * * 1"

jobs:
  analyze:
    name: Analyze (python)
    runs-on: ubuntu-latest
    if: ${{ !github.event.repository.private }}
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: python

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:python"

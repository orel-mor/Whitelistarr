name: Release

# Merge to main -> python-semantic-release cuts a STABLE release (GitHub Release
# + CHANGELOG) and publishes a multi-arch image tagged :latest + :<version>.
# Docker steps only run when the commits warrant a release.

on:
  push:
    branches: [main]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Release + publish image
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      issues: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install
        run: pip install -e ".[dev]"

      - name: Test (pytest)
        run: pytest -q

      - name: Python Semantic Release
        id: release
        uses: python-semantic-release/python-semantic-release@v10.5.3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          # Tag + GitHub Release only. Don't commit the version back: setuptools-scm
          # derives it from the tag, so main stays free of chore(release) commits.
          commit: "false"

      - name: Set up QEMU
        if: steps.release.outputs.released == 'true'
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        if: steps.release.outputs.released == 'true'
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        if: steps.release.outputs.released == 'true'
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to GHCR
        if: steps.release.outputs.released == 'true'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        if: steps.release.outputs.released == 'true'
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          build-args: |
            SETUPTOOLS_SCM_PRETEND_VERSION_FOR_WHITELISTARR=${{ steps.release.outputs.version }}
          tags: |
            orelmor/whitelistarr:latest
            orelmor/whitelistarr:${{ steps.release.outputs.version }}
            ghcr.io/orel-mor/whitelistarr:latest
            ghcr.io/orel-mor/whitelistarr:${{ steps.release.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

      - name: Publish GitHub Release
        if: steps.release.outputs.released == 'true'
        uses: python-semantic-release/publish-action@v10.5.3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          tag: ${{ steps.release.outputs.tag }}

      - name: Label released PR + issues
        if: steps.release.outputs.released == 'true'
        uses: actions/github-script@v9
        env:
          VERSION: ${{ steps.release.outputs.version }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { owner, repo } = context.repo;
            const version = process.env.VERSION;
            const note = `🚀 Released in **v${version}** — image \`orelmor/whitelistarr:latest\` + \`:${version}\`.`;
            async function ensureLabel(name, color, description) {
              try { await github.rest.issues.getLabel({ owner, repo, name }); }
              catch (e) { if (e.status === 404) await github.rest.issues.createLabel({ owner, repo, name, color, description }); }
            }
            async function mark(number) {
              await github.rest.issues.addLabels({ owner, repo, issue_number: number, labels: ['released'] });
              await github.rest.issues.createComment({ owner, repo, issue_number: number, body: note });
            }
            await ensureLabel('released', '0e8a16', 'Shipped in a stable release');

            const { data: prs } = await github.rest.repos.listPullRequestsAssociatedWithCommit({ owner, repo, commit_sha: context.sha });
            const seen = new Set();
            for (const pr of prs) {
              await mark(pr.number);
              // Issues this PR closed via "Closes #N" — label + note them too.
              const q = await github.graphql(
                `query($owner:String!,$repo:String!,$pr:Int!){
                   repository(owner:$owner,name:$repo){
                     pullRequest(number:$pr){ closingIssuesReferences(first:50){ nodes{ number } } } } }`,
                { owner, repo, pr: pr.number });
              for (const issue of q.repository.pullRequest.closingIssuesReferences.nodes) {
                if (seen.has(issue.number)) continue;
                seen.add(issue.number);
                await mark(issue.number);
              }
            }

      - name: Notify (Apprise / Discord)
        if: steps.release.outputs.released == 'true'
        continue-on-error: true
        env:
          APPRISE_URL: ${{ secrets.APPRISE_NOTIFY_URL }}
          VERSION: ${{ steps.release.outputs.version }}
        run: |
          if [ -z "$APPRISE_URL" ]; then echo "APPRISE_NOTIFY_URL not set — skipping notification."; exit 0; fi
          pip install --quiet apprise
          apprise -t "🚀 Whitelistarr v$VERSION released" \
                  -b "Stable image published: orelmor/whitelistarr:latest and :$VERSION (+ GHCR). See the GitHub Release for the changelog." \
                  "$APPRISE_URL"

name: Release
run-name: Release${{ github.event.inputs.dry_run == 'true' && ' (dry run)' || '' }}

# Manual stable release. Trunk-based: features squash-merge into `main` (linear
# history) and every push builds the `:dev` image (see dev.yml). When you
# want to ship, run this workflow from the Actions tab:
#   * dry_run = true  (default) -> preview only: prints the next version + the
#     commits/notes that would ship to the job summary. Publishes NOTHING.
#   * dry_run = false           -> python-semantic-release cuts the stable release
#     (tag + GitHub Release + CHANGELOG) and publishes the multi-arch image tagged
#     :latest + :<version>, from all commits since the last tag.

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run"
        type: boolean
        default: true

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    name: Release + publish image
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      issues: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install
        run: pip install -e ".[dev]"

      - name: Test (pytest)
        run: pytest -q

      # --- Dry run: preview only ------------------------------------------------
      - name: Preview release (dry run)
        if: ${{ inputs.dry_run }}
        run: |
          pip install --quiet python-semantic-release==10.5.3
          LAST=$(git describe --tags --abbrev=0 2>/dev/null || echo "(none)")
          NEXT=$(semantic-release version --print 2>/dev/null || true)
          {
            echo "## 🔎 Release preview (dry run — nothing published)"
            echo ""
            echo "| | |"
            echo "|---|---|"
            echo "| Last tag | \`${LAST}\` |"
            echo "| Next version | \`${NEXT:-no release-worthy commits}\` |"
            echo ""
            echo "### Commits since \`${LAST}\`"
            echo ""
            if [ "$LAST" = "(none)" ]; then RANGE=HEAD; else RANGE="${LAST}..HEAD"; fi
            git log --no-merges --pretty='- %s' "$RANGE"
          } >> "$GITHUB_STEP_SUMMARY"

      # --- Real release ---------------------------------------------------------
      - name: Python Semantic Release
        id: release
        if: ${{ !inputs.dry_run }}
        uses: python-semantic-release/python-semantic-release@v10.6.1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          # Tag + GitHub Release only. Don't commit the version back: setuptools-scm
          # derives it from the tag, so main stays free of chore(release) commits.
          commit: "false"

      - name: Set up QEMU
        if: ${{ !inputs.dry_run && steps.release.outputs.released == 'true' }}
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        if: ${{ !inputs.dry_run && steps.release.outputs.released == 'true' }}
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        if: ${{ !inputs.dry_run && steps.release.outputs.released == 'true' }}
        uses: docker/login-action@v4
        with:
          username: orelmor
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to GHCR
        if: ${{ !inputs.dry_run && steps.release.outputs.released == 'true' }}
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        if: ${{ !inputs.dry_run && steps.release.outputs.released == 'true' }}
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          build-args: |
            SETUPTOOLS_SCM_PRETEND_VERSION_FOR_WHITELISTARR=${{ steps.release.outputs.version }}
          tags: |
            orelmor/whitelistarr:latest
            orelmor/whitelistarr:${{ steps.release.outputs.version }}
            ghcr.io/orel-mor/whitelistarr:latest
            ghcr.io/orel-mor/whitelistarr:${{ steps.release.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

      - name: Publish GitHub Release
        if: ${{ !inputs.dry_run && steps.release.outputs.released == 'true' }}
        uses: python-semantic-release/publish-action@v10.6.1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          tag: ${{ steps.release.outputs.tag }}

      - name: Label released PRs + issues
        if: ${{ !inputs.dry_run && steps.release.outputs.released == 'true' }}
        uses: actions/github-script@v9
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { owner, repo } = context.repo;
            async function ensureLabel(name, color, description) {
              try { await github.rest.issues.getLabel({ owner, repo, name }); }
              catch (e) { if (e.status === 404) await github.rest.issues.createLabel({ owner, repo, name, color, description }); }
            }
            await ensureLabel('released', '0e8a16', 'Shipped in a stable release');

            // Trunk-based + batched release: walk every commit from the previous
            // tag up to HEAD, collect the PRs that introduced them, and label them.
            const { execSync } = require('child_process');
            let range = 'HEAD';
            try {
              const prev = execSync('git describe --tags --abbrev=0 HEAD^ 2>/dev/null').toString().trim();
              if (prev) range = `${prev}..HEAD`;
            } catch (e) { /* first release: no previous tag */ }
            const shas = execSync(`git rev-list ${range}`).toString().split('\n').filter(Boolean);

            const seenPr = new Set();
            const seenIssue = new Set();
            async function mark(number, set) {
              if (set.has(number)) return;
              set.add(number);
              await github.rest.issues.addLabels({ owner, repo, issue_number: number, labels: ['released'] });
            }
            for (const sha of shas) {
              const { data: prs } = await github.rest.repos.listPullRequestsAssociatedWithCommit({ owner, repo, commit_sha: sha });
              for (const pr of prs) {
                if (seenPr.has(pr.number)) continue;
                await mark(pr.number, seenPr);
                const q = await github.graphql(
                  `query($owner:String!,$repo:String!,$pr:Int!){
                     repository(owner:$owner,name:$repo){
                       pullRequest(number:$pr){ closingIssuesReferences(first:50){ nodes{ number } } } } }`,
                  { owner, repo, pr: pr.number });
                for (const issue of q.repository.pullRequest.closingIssuesReferences.nodes) {
                  await mark(issue.number, seenIssue);
                }
              }
            }

      - name: Notify (Apprise / Discord)
        if: ${{ !inputs.dry_run && steps.release.outputs.released == 'true' }}
        continue-on-error: true
        env:
          APPRISE_URL: ${{ secrets.APPRISE_NOTIFY_URL }}
          VERSION: ${{ steps.release.outputs.version }}
        run: |
          if [ -z "$APPRISE_URL" ]; then echo "APPRISE_NOTIFY_URL not set — skipping notification."; exit 0; fi
          pip install --quiet apprise
          apprise -t "🚀 Whitelistarr v$VERSION released" \
                  -b "Stable image published: orelmor/whitelistarr:latest and :$VERSION (+ GHCR). See the GitHub Release for the changelog." \
                  "$APPRISE_URL"

      # Report the real release to the run summary (dry runs already write their
      # own preview above).
      - name: Summary
        if: ${{ !inputs.dry_run }}
        env:
          RELEASED: ${{ steps.release.outputs.released }}
          VERSION: ${{ steps.release.outputs.version }}
          TAG: ${{ steps.release.outputs.tag }}
        run: |
          if [ "$RELEASED" = "true" ]; then
            {
              echo "## 🚀 Released v${VERSION}"
              echo ""
              echo "| | |"
              echo "|---|---|"
              echo "| Version | \`${VERSION}\` |"
              echo "| Images | \`orelmor/whitelistarr:latest\` + \`:${VERSION}\` (+ GHCR) |"
              echo "| Release | ${{ github.server_url }}/${{ github.repository }}/releases/tag/${TAG} |"
            } >> "$GITHUB_STEP_SUMMARY"
          else
            echo "## 🛑 No release cut — no release-worthy commits since the last tag." >> "$GITHUB_STEP_SUMMARY"
          fi

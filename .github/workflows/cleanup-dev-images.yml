name: Cleanup dev images

# Prune old development images so the immutable :<release>.dev<build>-<sha> tags
# don't pile up forever. Deletes dev tags older than 30 days from BOTH registries,
# always keeping the newest few (so the rolling :dev and recent builds survive).
# On GHCR it also sweeps orphaned untagged manifests (the sha256:<digest> entries
# left behind when a tag like :dev/:latest is moved to a newer build) — these
# belong to no tag, so nothing references them. Never touches :latest or release
# (:X.Y.Z) tags, nor the platform child manifests still referenced by a live tag.
# Runs weekly; a manual run defaults to dry-run (preview) so you can confirm first.

on:
  schedule:
    - cron: "0 4 * * 1" # Mondays 04:00 UTC
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Preview only — list what would be deleted, delete nothing"
        type: boolean
        default: true

concurrency:
  group: cleanup-dev-images
  cancel-in-progress: false

jobs:
  ghcr:
    name: Prune GHCR dev + untagged images (>30d)
    runs-on: ubuntu-latest
    permissions:
      packages: write # list + delete versions of this repo's GHCR package
    steps:
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      # Direct GitHub Packages REST pruner (mirrors the Docker Hub job below).
      # We rolled our own instead of a marketplace action because the built-in
      # GITHUB_TOKEN can't use the wildcard tag filters those actions rely on
      # (they require a classic PAT / GitHub App token). This uses only the
      # temporal token via the /user/packages endpoints — no extra secret.
      - name: Prune
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DRY_RUN: ${{ (github.event_name == 'workflow_dispatch' && inputs.dry_run) && 'true' || 'false' }}
        run: |
          python3 - <<'PY'
          import base64, datetime, json, os, re, urllib.error, urllib.request

          OWNER, PACKAGE = "orel-mor", "whitelistarr"  # orel-mor is a User account
          API = f"https://api.github.com/user/packages/container/{PACKAGE}/versions"
          MANIFEST = f"https://ghcr.io/v2/{OWNER}/{PACKAGE}/manifests"
          # immutable dev tags only, e.g. 1.9.0.dev4-a8402c8 (not :dev/:latest/:X.Y.Z)
          DEV_RE = re.compile(r"\.dev\d+-")
          KEEP = 5            # newest dev builds always kept (incl. the live :dev one)
          KEEP_UNTAGGED = 10  # headroom against racing an in-flight push
          DAYS = 30
          DRY = os.environ.get("DRY_RUN", "false") == "true"
          TOKEN = os.environ["GHCR_TOKEN"]
          cutoff = datetime.datetime.now(datetime.timezone.utc) - datetime.timedelta(days=DAYS)

          GH = {"Authorization": f"Bearer {TOKEN}",
                "Accept": "application/vnd.github+json",
                "X-GitHub-Api-Version": "2022-11-28"}
          # ghcr.io registry wants the token base64-encoded as a Bearer credential
          REG = {"Authorization": "Bearer " + base64.b64encode(TOKEN.encode()).decode(),
                 "Accept": "application/vnd.oci.image.index.v1+json, "
                           "application/vnd.oci.image.manifest.v1+json, "
                           "application/vnd.docker.distribution.manifest.list.v2+json, "
                           "application/vnd.docker.distribution.manifest.v2+json"}

          def call(url, method="GET", headers=None):
              req = urllib.request.Request(url, method=method, headers=headers or GH)
              with urllib.request.urlopen(req) as r:
                  raw = r.read()
                  return (json.loads(raw) if raw else None), r.headers

          # 1. list every package version (paginated via the Link header)
          versions, url = [], f"{API}?per_page=100"
          while url:
              page, hdrs = call(url)
              versions += page
              url = next((p[p.index("<") + 1:p.index(">")]
                          for p in hdrs.get("Link", "").split(",") if 'rel="next"' in p), None)

          def tags(v): return v.get("metadata", {}).get("container", {}).get("tags") or []
          def when(v):
              return datetime.datetime.fromisoformat(
                  (v.get("updated_at") or v["created_at"]).replace("Z", "+00:00"))

          # 2. candidates. A dev victim's tags must ALL be immutable dev tags, so we
          #    never touch a version that also carries :dev/:latest/:X.Y.Z.
          dev = sorted((v for v in versions if tags(v) and all(DEV_RE.search(t) for t in tags(v))),
                       key=when, reverse=True)
          dev_victims = [v for v in dev[KEEP:] if when(v) < cutoff]
          untagged = sorted((v for v in versions if not tags(v)), key=when, reverse=True)
          untagged_victims = [v for v in untagged[KEEP_UNTAGGED:] if when(v) < cutoff]

          # 3. protect multi-arch children of kept tags (fail-closed). A retained
          #    tag like :latest is an image index whose per-platform child manifests
          #    show up as untagged versions; deleting one corrupts the live tag.
          victim_ids = {v["id"] for v in dev_victims}
          kept_tagged = [v for v in versions if tags(v) and v["id"] not in victim_ids]

          def children(digest):
              body, _ = call(f"{MANIFEST}/{digest}", headers=REG)
              return [m["digest"] for m in body.get("manifests", [])] if body else []

          protected, registry_ok = set(), True
          try:
              for v in kept_tagged:
                  protected.update(children(v["name"]))  # version name == digest
          except (urllib.error.URLError, KeyError, ValueError) as e:
              # Couldn't resolve a kept tag's manifest -> don't risk deleting a live
              # child. Drop the untagged sweep; dev indexes are top-level and safe.
              registry_ok = False
              untagged_victims = []
              print(f"::warning::registry manifest fetch failed ({e}); skipping untagged sweep")

          dev_victims = [v for v in dev_victims if v["name"] not in protected]
          untagged_victims = [v for v in untagged_victims if v["name"] not in protected]

          # 4. delete (DRY-guarded)
          def label(v): return f"{v['name']} [{', '.join(tags(v)) or '<untagged>'}] ({when(v).date()})"
          victims = dev_victims + untagged_victims
          for v in victims:
              print(f"{'DRY would delete' if DRY else 'deleting'}: {label(v)}")
              if not DRY:
                  call(f"{API}/{v['id']}", method="DELETE")
          print(f"{len(dev_victims)} dev + {len(untagged_victims)} untagged version(s) "
                f"{'would be ' if DRY else ''}deleted ({len(dev)} dev, {len(untagged)} untagged "
                f"total; keeping newest {KEEP} dev + {KEEP_UNTAGGED} untagged + any <{DAYS}d).")

          summary = os.environ.get("GITHUB_STEP_SUMMARY")
          if summary:
              with open(summary, "a") as fh:
                  fh.write(f"## 🧹 GHCR dev cleanup ({'dry run — nothing deleted' if DRY else 'deleted'})\n\n")
                  if not registry_ok:
                      fh.write("> ⚠️ registry manifest fetch failed — untagged sweep skipped this run.\n\n")
                  fh.write("| | |\n|---|---|\n")
                  fh.write(f"| Dev tags total | `{len(dev)}` |\n")
                  fh.write(f"| Untagged total | `{len(untagged)}` |\n")
                  fh.write(f"| {'Would prune' if DRY else 'Pruned'} dev | `{len(dev_victims)}` |\n")
                  fh.write(f"| {'Would prune' if DRY else 'Pruned'} untagged | `{len(untagged_victims)}` |\n")
                  fh.write(f"| Kept | newest {KEEP} dev + {KEEP_UNTAGGED} untagged + any <{DAYS}d |\n")
                  if victims:
                      fh.write(f"\n### {'Would prune' if DRY else 'Pruned'}\n\n")
                      fh.write("\n".join(f"- `{label(v)}`" for v in victims) + "\n")
          PY

  dockerhub:
    name: Prune Docker Hub dev images (>30d)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Prune
        env:
          DH_USER: orelmor
          DH_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          DRY_RUN: ${{ (github.event_name == 'workflow_dispatch' && inputs.dry_run) && 'true' || 'false' }}
        run: |
          python3 - <<'PY'
          import os, re, json, datetime, urllib.request
          REPO = "orelmor/whitelistarr"
          # immutable dev tags only, e.g. 1.9.0.dev4-a8402c8 (not :dev/:latest/:X.Y.Z)
          DEV_RE = re.compile(r"\.dev\d+-")
          KEEP = 5
          DAYS = 30
          DRY = os.environ.get("DRY_RUN", "false") == "true"
          cutoff = datetime.datetime.now(datetime.timezone.utc) - datetime.timedelta(days=DAYS)

          def call(url, method="GET", headers=None, data=None):
              body = json.dumps(data).encode() if data is not None else None
              h = {"Content-Type": "application/json", **(headers or {})}
              req = urllib.request.Request(url, data=body, headers=h, method=method)
              with urllib.request.urlopen(req) as r:
                  return json.load(r) if r.length != 0 and method != "DELETE" else None

          jwt = call("https://hub.docker.com/v2/users/login",
                     method="POST",
                     data={"username": os.environ["DH_USER"], "password": os.environ["DH_TOKEN"]})["token"]
          H = {"Authorization": f"JWT {jwt}"}

          tags, url = [], f"https://hub.docker.com/v2/repositories/{REPO}/tags?page_size=100"
          while url:
              page = call(url, headers=H)
              tags += page["results"]
              url = page.get("next")

          devs = sorted((t for t in tags if DEV_RE.search(t["name"])),
                        key=lambda t: t["last_updated"], reverse=True)
          victims = [t for t in devs[KEEP:]
                     if datetime.datetime.fromisoformat(t["last_updated"].replace("Z", "+00:00")) < cutoff]

          for t in victims:
              print(f"{'DRY would delete' if DRY else 'deleting'}: {t['name']} (updated {t['last_updated']})")
              if not DRY:
                  call(f"https://hub.docker.com/v2/repositories/{REPO}/tags/{t['name']}/",
                       method="DELETE", headers=H)
          print(f"{len(victims)} tag(s) {'would be ' if DRY else ''}deleted "
                f"({len(devs)} dev tags total, keeping newest {KEEP} + any <{DAYS}d).")

          summary = os.environ.get("GITHUB_STEP_SUMMARY")
          if summary:
              with open(summary, "a") as fh:
                  fh.write(f"## 🧹 Docker Hub dev cleanup ({'dry run — nothing deleted' if DRY else 'deleted'})\n\n")
                  fh.write("| | |\n|---|---|\n")
                  fh.write(f"| Dev tags total | `{len(devs)}` |\n")
                  fh.write(f"| {'Would prune' if DRY else 'Pruned'} | `{len(victims)}` |\n")
                  fh.write(f"| Kept | newest {KEEP} + any <{DAYS}d |\n")
                  if victims:
                      fh.write(f"\n### {'Would prune' if DRY else 'Pruned'} tags\n\n")
                      fh.write("\n".join(f"- `{t['name']}` ({t['last_updated']})" for t in victims) + "\n")
          PY

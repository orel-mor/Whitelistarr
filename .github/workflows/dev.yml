name: Dev

# Trunk-based dev channel. Every push to `main` builds and publishes the latest
# development image as :dev (rolling) plus an immutable version tag like
# :1.2.1.dev5 (next patch of the last release + commits since), so you can test
# and pin merged code before cutting a stable release (see release.yml). No git
# tag, no GitHub Release — just images. amd64-only to keep per-merge CI fast;
# stable releases are multi-arch. Skips docs-only pushes (paths filter).

on:
  push:
    branches: [main]
    paths:
      - "Dockerfile"
      - ".dockerignore"
      - "app/**"
      - "pyproject.toml"
      - ".github/workflows/dev.yml"

concurrency:
  group: dev
  cancel-in-progress: true

jobs:
  build:
    name: Build + push :dev
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0 # tags needed to compute the dev version

      - name: Resolve dev version
        id: ver
        # One identity per build = <last release> + <build #> + <commit>, with NO
        # git tag / release created and NO version guessing. Emitted in two forms
        # because Docker-tag and PEP 440 rules differ but carry the same facts:
        #   tag     = dev-1.9.0-4-ga8402c8   (pretty Docker tag)
        #   version = 1.9.0.post4+ga8402c8   (image __version__; PEP 440 post-
        #             release of the last tag, so it sorts after 1.9.0 / before
        #             1.9.1 with no guess; the sha is the PEP 440 local segment)
        # BASE = last release; N = commits since it that touch the image (same
        # paths as this workflow's trigger), so N is the build count, not docs
        # pushes. SHA pins the exact source commit (deployed image -> commit).
        run: |
          PATHS=(Dockerfile .dockerignore app pyproject.toml .github/workflows/dev.yml)
          if LAST=$(git describe --tags --abbrev=0 --match 'v[0-9]*' 2>/dev/null); then
            BASE=${LAST#v}
            N=$(git rev-list "${LAST}..HEAD" --count -- "${PATHS[@]}")
          else
            BASE=0.0.0
            N=$(git rev-list HEAD --count -- "${PATHS[@]}")
          fi
          SHA=$(git rev-parse --short HEAD)
          echo "version=${BASE}.post${N}+g${SHA}" >> "$GITHUB_OUTPUT"
          echo "tag=dev-${BASE}-${N}-g${SHA}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          platforms: linux/amd64
          build-args: |
            SETUPTOOLS_SCM_PRETEND_VERSION_FOR_WHITELISTARR=${{ steps.ver.outputs.version }}
          tags: |
            orelmor/whitelistarr:dev
            orelmor/whitelistarr:${{ steps.ver.outputs.tag }}
            ghcr.io/orel-mor/whitelistarr:dev
            ghcr.io/orel-mor/whitelistarr:${{ steps.ver.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

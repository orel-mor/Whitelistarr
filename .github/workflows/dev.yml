name: Dev

# Trunk-based dev channel. Every push to `main` builds and publishes the latest
# development image as :dev (rolling) plus an immutable, traceable tag like
# :1.9.0.dev4-a8402c8 = <last release>.dev<build #>-<short sha>. No git tag, no
# GitHub Release — just images. amd64-only to keep per-merge CI fast; stable
# releases are multi-arch. Skips docs-only pushes (paths filter).
#
# The same identity appears three ways, all carrying the commit sha:
#   tag           1.9.0.dev4-a8402c8   (Docker tag; "-" because tags forbid "+")
#   /health       1.9.0.dev4+a8402c8   (image __version__; PEP 440, sha in +local)
#   OCI label     org.opencontainers.image.revision = <full sha>  (docker inspect)
# Note: .dev is a PEP 440 PRE-release marker, so 1.9.0.dev4 sorts *before* 1.9.0.
# Nothing here depends on version ordering; it's a deliberate, readable dev label.

on:
  push:
    branches: [main]
    paths:
      - "Dockerfile"
      - ".dockerignore"
      - "app/**"
      - "pyproject.toml"
      - ".github/workflows/dev.yml"

concurrency:
  group: dev
  cancel-in-progress: true

jobs:
  build:
    name: Build + push :dev
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0 # tags needed to compute the dev version

      - name: Resolve dev version
        id: ver
        # BASE = last release; N = build count = commits since it that touch the
        # image (same paths as this workflow's trigger), so docs pushes don't bump
        # it; SHA pins the exact source commit. Two forms: "+" for the PEP 440
        # __version__, "-" for the Docker tag (which forbids "+").
        run: |
          PATHS=(Dockerfile .dockerignore app pyproject.toml .github/workflows/dev.yml)
          if LAST=$(git describe --tags --abbrev=0 --match 'v[0-9]*' 2>/dev/null); then
            BASE=${LAST#v}
            N=$(git rev-list "${LAST}..HEAD" --count -- "${PATHS[@]}")
          else
            BASE=0.0.0
            N=$(git rev-list HEAD --count -- "${PATHS[@]}")
          fi
          SHA=$(git rev-parse --short HEAD)
          echo "version=${BASE}.dev${N}+${SHA}" >> "$GITHUB_OUTPUT"
          echo "tag=${BASE}.dev${N}-${SHA}" >> "$GITHUB_OUTPUT"

      - name: Docker metadata (tags + OCI labels)
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: |
            orelmor/whitelistarr
            ghcr.io/orel-mor/whitelistarr
          tags: |
            type=raw,value=dev
            type=raw,value=${{ steps.ver.outputs.tag }}
          # OCI labels (revision=<full sha>, source, created, ...) are added
          # automatically -> `docker inspect` resolves any tag back to its commit.

      - uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: orelmor
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          platforms: linux/amd64
          build-args: |
            SETUPTOOLS_SCM_PRETEND_VERSION_FOR_WHITELISTARR=${{ steps.ver.outputs.version }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

      # Report what was published to the run summary (only after a successful push).
      - name: Summary
        run: |
          {
            echo "## 🐳 Dev image published"
            echo ""
            echo "| | |"
            echo "|---|---|"
            echo "| Version (\`/health\`) | \`${{ steps.ver.outputs.version }}\` |"
            echo "| Commit | \`${{ github.sha }}\` |"
            echo "| Digest | \`${{ steps.build.outputs.digest }}\` |"
            echo ""
            echo "### Tags"
            echo '```'
            echo "${{ steps.meta.outputs.tags }}"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

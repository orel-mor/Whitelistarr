name: PR Title

# Enforce Conventional-Commit PR titles. Since PRs are squash-merged, the title
# becomes the commit python-semantic-release reads — a bad title = no release.

on:
  pull_request_target:
    types: [opened, edited, synchronize, reopened]

permissions:
  pull-requests: read

jobs:
  validate:
    name: Validate PR title
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

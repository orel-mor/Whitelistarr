name: PR Title

# Enforce Conventional-Commit PR titles. feature -> dev PRs are squash-merged, so
# the title becomes the commit python-semantic-release reads — a bad title = no
# release. dev -> main promotion PRs are auto-titled `release: <datetime>` (see
# release-pr-title.yml); the `release` type below keeps that title valid.

on:
  pull_request_target:
    types: [opened, edited, synchronize, reopened]

permissions:
  pull-requests: read

jobs:
  validate:
    name: Validate PR title
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # Default Conventional-Commit types + `release` for dev -> main promotion PRs.
          types: |
            feat
            fix
            docs
            style
            refactor
            perf
            test
            build
            ci
            chore
            revert
            release
